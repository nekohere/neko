// chatgpt made this
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neko · status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: #0d0e10;
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      box-shadow: 0 25px 40px -15px #000000, 0 0 0 1px rgba(255,255,255,0.03) inset;
      border: 1px solid #1e1f24;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    .avatar-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #0f0f12;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px #000000;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #1c1e22;
    }

    .status-badge {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid #0d0e10;
      background-color: #2b2d33;
    }

    .status-badge.idle { background-color: #faa61a; }
    .status-badge.online { background-color: #3ba55d; }
    .status-badge.dnd { background-color: #ed4245; }
    .status-badge.offline { background-color: #2b2d33; }

    .name-area {
      flex: 1;
    }

    .display-name {
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.2;
      color: #ffffff;
      letter-spacing: -0.5px;
    }

    .username-tag {
      color: #7f838c;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 2px;
    }

    .username-tag span {
      background: #181a1f;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      font-size: 0.75rem;
      color: #a0a4ae;
    }

    .spotify-embed {
      background: #08090b;
      border-radius: 1.8rem;
      padding: 1.5rem 1.4rem;
      margin: 1.5rem 0 1.8rem 0;
      border-left: 6px solid #1db954;
      box-shadow: 0 8px 0 #020202;
    }

    .spotify-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      color: #9ca0aa;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
    }

    .song-row {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .album-art {
      width: 90px;
      height: 90px;
      border-radius: 14px;
      background: #121317;
      box-shadow: 0 6px 12px #000000;
      flex-shrink: 0;
      overflow: hidden;
    }

    .album-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .song-details {
      flex: 1;
      min-width: 180px;
    }

    .song-name {
      font-size: 1.4rem;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }

    .artist-name {
      font-size: 1rem;
      color: #acb0b9;
      margin-bottom: 0.3rem;
      font-weight: 400;
    }

    .album-name {
      font-size: 0.85rem;
      color: #6b707b;
      margin-bottom: 0.7rem;
    }

    .progress {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      color: #8b909b;
      margin-top: 0.5rem;
    }

    .bar {
      background: #1c1e24;
      height: 5px;
      flex: 1;
      border-radius: 10px;
      overflow: hidden;
    }

    .bar-fill {
      background: #1db954;
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 0.3s linear;
    }

    .not-playing {
      background: #08090b;
      border-radius: 1.8rem;
      padding: 1.5rem;
      margin: 1.5rem 0 1.8rem 0;
      text-align: center;
      color: #8b909b;
      border: 1px solid #1e1f24;
      font-size: 0.95rem;
    }

    .dev-tagline {
      background: #0f1013;
      border-radius: 50px;
      padding: 0.9rem 1.2rem;
      text-align: center;
      border: 1px solid #1e1f24;
      margin-top: 1rem;
    }

    .dev-tagline p {
      color: #ffffff;
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .dev-tagline strong {
      background: #1c1e24;
      font-weight: 700;
      color: #ffffff;
      padding: 0.1rem 0.7rem;
      border-radius: 40px;
      margin: 0 0.3rem;
    }
  </style>
</head>
<body>
  <div class="card" id="app"></div>

  <script>
    (function() {
      const container = document.getElementById('app');
      const userId = '279827355743289344';
      const discordCdn = 'https://cdn.discordapp.com';

      const getAvatarUrl = (hash, id, discriminator = '0') => 
        hash 
          ? `${discordCdn}/avatars/${id}/${hash}.${hash.startsWith('a_') ? 'gif' : 'png'}?size=128`
          : `https://cdn.discordapp.com/embed/avatars/${discriminator % 5}.png`;

      const formatTime = (ms) => {
        if (!ms || ms < 0) return '0:00';
        const totalSeconds = Math.floor(ms / 1000);
        return `${Math.floor(totalSeconds / 60)}:${(totalSeconds % 60).toString().padStart(2, '0')}`;
      };

      const getStatusClass = (status) => 
        ({ online: 'online', idle: 'idle', dnd: 'dnd' }[status] ?? 'offline');

      const calculateProgress = (start, end) => {
        if (!start || !end) return { percent: 0, current: '0:00', total: '0:00' };
        const now = Date.now();
        const total = end - start;
        const elapsed = Math.min(now - start, total);
        const percent = total > 0 ? (elapsed / total) * 100 : 0;
        return {
          percent: Math.min(100, Math.max(0, percent)),
          current: formatTime(elapsed),
          total: formatTime(total)
        };
      };

      const fetchData = async () => {
        try {
          const response = await fetch('https://api.lanyard.rest/v1/users/279827355743289344');
          const { data, success } = await response.json();
          return success ? data : null;
        } catch {
          return null;
        }
      };

      const render = (data) => {
        if (!data) {
          container.innerHTML = `
            <div class="profile-row">
              <div class="avatar-wrapper">
                <div class="avatar" style="background: #121317;"></div>
                <div class="status-badge offline"></div>
              </div>
              <div class="name-area">
                <div class="display-name">Neko</div>
                <div class="username-tag">@neeeeekkkkkooooo</div>
              </div>
            </div>
            <div class="not-playing">Not playing anything</div>
            <div class="dev-tagline">
              <p>discord.js and python developer Ye</p>
            </div>
          `;
          return;
        }

        const { 
          discord_user, 
          discord_status = 'idle', 
          listening_to_spotify, 
          spotify 
        } = data;

        const { 
          avatar, 
          id, 
          discriminator = '0', 
          display_name, 
          global_name, 
          username 
        } = discord_user ?? {};

        const avatarUrl = getAvatarUrl(avatar, id, discriminator);
        const displayName = display_name ?? global_name ?? 'Neko';
        const statusClass = getStatusClass(discord_status);
        const isPlaying = listening_to_spotify && spotify;

        const { 
          percent = 0, 
          current = '0:00', 
          total = '0:00' 
        } = isPlaying 
          ? calculateProgress(spotify.timestamps?.start, spotify.timestamps?.end)
          : {};

        container.innerHTML = `
          <div class="profile-row">
            <div class="avatar-wrapper">
              <img class="avatar" src="${avatarUrl}" alt="Neko avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'">
              <div class="status-badge ${statusClass}"></div>
            </div>
            <div class="name-area">
              <div class="display-name">${displayName}</div>
              <div class="username-tag">
                @${username ?? 'neeeeekkkkkooooo'}
                ${discriminator !== '0' ? `<span>#${discriminator}</span>` : ''}
              </div>
            </div>
          </div>

          ${isPlaying ? `
          <div class="spotify-embed">
            <div class="spotify-header">spotify</div>
            <div class="song-row">
              <div class="album-art">
                <img src="${spotify.album_art_url}" alt="album cover" loading="lazy">
              </div>
              <div class="song-details">
                <div class="song-name">${spotify.song}</div>
                <div class="artist-name">${spotify.artist}</div>
                <div class="album-name">${spotify.album}</div>
                <div class="progress">
                  <span>${current}</span>
                  <div class="bar"><div class="bar-fill" style="width: ${percent}%;"></div></div>
                  <span>${total}</span>
                </div>
              </div>
            </div>
          </div>
          ` : `
          <div class="not-playing">Not playing anything</div>
          `}

          <div class="dev-tagline">
            <p>discord.js and python developer Ye</p>
          </div>
        `;
      };

      let currentData = null;
      
      const update = async () => {
        const newData = await fetchData();
        if (newData) {
          currentData = newData;
        }
        render(currentData);
      };

      update();
      setInterval(update, 1000);
    })();
  </script>
</body>
</html>
