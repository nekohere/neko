<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>neko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Vampyre&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0a0c;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: #000000;
      border-radius: 2rem;
      padding: 2rem 1.8rem;
      box-shadow: 0 30px 50px -20px #000000, 0 0 0 1px #2a2a2a inset;
      border: 1px solid #222222;
    }

    .profile-row {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 2rem;
      animation: profileBuild 0.6s ease-out forwards;
    }

    @keyframes profileBuild {
      0% { opacity: 0; transform: translateY(-10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .avatar-wrapper {
      position: relative;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px #000000;
    }

    .avatar {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #2a2a2a;
    }

    .status-badge {
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 3px solid #000000;
      background-color: #2b2d33;
    }

    .status-badge.idle { background-color: #faa61a; }
    .status-badge.online { background-color: #3ba55d; }
    .status-badge.dnd { background-color: #ed4245; }
    .status-badge.offline { background-color: #5f5f5f; }

    .name-area {
      flex: 1;
    }

    .display-name {
      font-size: 2rem;
      font-weight: 600;
      line-height: 1.2;
      color: #ffffff;
      letter-spacing: -0.5px;
      font-family: 'Vampyre', 'Inter', sans-serif;
    }

    .username-tag {
      color: #a0a0a0;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      margin-top: 2px;
    }

    .username-tag span {
      background: #1f1f1f;
      padding: 0.2rem 0.6rem;
      border-radius: 30px;
      font-size: 0.75rem;
      color: #cccccc;
    }

    .main-content-compact {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .dev-tagline-compact {
      background: #0f0f0f;
      border-radius: 50px;
      padding: 0.7rem 1.2rem;
      text-align: center;
      border: 1px solid #2c2c2c;
      animation: buildItem 0.5s ease-out forwards;
      animation-delay: 0.2s;
      opacity: 0;
      transform: translateY(10px);
    }

    .dev-tagline-compact p {
      color: #e0e0e0;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .spotify-embed {
      background: #0c0c0c;
      border-radius: 1.8rem;
      padding: 1.5rem 1.4rem;
      border-left: 6px solid #ffffff;
      box-shadow: 0 8px 0 #030303;
      animation: buildItem 0.5s ease-out forwards;
      animation-delay: 0.4s;
    }

    .song-row {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .album-art {
      width: 90px;
      height: 90px;
      border-radius: 14px;
      background: #1a1a1a;
      box-shadow: 0 6px 12px #000000;
      flex-shrink: 0;
      overflow: hidden;
    }

    .album-art img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .song-details {
      flex: 1;
      min-width: 180px;
    }

    .song-name {
      font-size: 1.4rem;
      font-weight: 600;
      color: #ffffff;
      line-height: 1.3;
      margin-bottom: 0.25rem;
    }

    .artist-name {
      font-size: 1rem;
      color: #b3b3b3;
      margin-bottom: 0.3rem;
      font-weight: 400;
    }

    .album-name {
      font-size: 0.85rem;
      color: #7a7a7a;
      margin-bottom: 0.7rem;
    }

    .progress-container {
      margin-top: 0.75rem;
    }

    .progress-bar {
      background: #282828;
      height: 5px;
      width: 100%;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 0.3rem;
    }

    .progress-fill {
      background: #ffffff;
      height: 100%;
      width: 0%;
      border-radius: 10px;
      transition: width 0.3s linear;
    }

    .time-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      color: #a0a0a0;
    }

    .current-time, .total-time {
      font-family: monospace;
    }

    .view-more-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.25rem;
      animation: buildItem 0.5s ease-out forwards;
      animation-delay: 0.6s;
      opacity: 0;
      transform: translateY(10px);
    }
    .view-more-link {
      color: #a0a0a0;
      cursor: pointer;
      text-decoration: none;
      border-bottom: 1px dashed #4a4a4a;
      padding-bottom: 2px;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .view-more-link:hover {
      color: #ffffff;
      border-bottom-color: #ffffff;
    }

    @keyframes buildItem {
      0% {
        opacity: 0;
        transform: translateY(10px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .more-section, .projects-section {
      margin: 1.5rem 0 1.8rem 0;
    }

    .fade-section {
      transition: opacity 0.3s ease;
    }

    .fade-section.hidden {
      display: none;
    }

    .transform-embed {
      background: #0c0c0c;
      border-radius: 1.8rem;
      padding: 1.6rem 1.5rem;
      border-left: 6px solid #ffffff;
      box-shadow: 0 8px 0 #030303;
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      padding: 0.4rem 0;
      animation: buildItem 0.5s ease-out forwards;
    }

    .loading-state img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      opacity: 0.9;
    }

    .loading-state .thinking-text {
      color: #a0a0a0;
      font-size: 0.7rem;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      font-weight: 400;
    }

    .results-state {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .projects-button-container {
      margin-bottom: 0.5rem;
      animation: buildItem 0.5s ease-out forwards;
      animation-delay: 0.2s;
      opacity: 0;
      transform: translateY(10px);
    }
    .projects-button {
      color: #a0a0a0;
      cursor: pointer;
      text-decoration: none;
      border-bottom: 1px dashed #4a4a4a;
      padding-bottom: 2px;
      font-size: 0.8rem;
      transition: color 0.2s;
      display: inline-block;
    }
    .projects-button:hover {
      color: #ffffff;
      border-bottom-color: #ffffff;
    }

    .profile-link-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 0.4rem;
      border-bottom: 1px solid #222;
      animation: buildItem 0.5s ease-out forwards;
      opacity: 0;
      transform: translateY(10px);
    }

    .profile-link-item:nth-child(2) { animation-delay: 0.4s; }
    .profile-link-item:nth-child(3) { animation-delay: 0.6s; }
    .profile-link-item:nth-child(4) { animation-delay: 0.8s; }
    .profile-link-item:nth-child(5) { animation-delay: 1.0s; }

    .profile-link-item:last-child {
      border-bottom: none;
    }

    .profile-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      object-fit: cover;
      background: #1f1f1f;
    }

    .profile-info {
      flex: 1;
    }
    .profile-info .handle {
      color: #ffffff;
      font-weight: 500;
      font-size: 1rem;
    }
    .profile-info .platform {
      color: #8f8f8f;
      font-size: 0.8rem;
    }
    .profile-link-item a {
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
    }

    .back-button {
      background: transparent;
      border: none;
      color: #a0a0a0;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0.5rem 0 0 0;
      text-align: left;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      border-top: 1px solid #2a2a2a;
      margin-top: 0.2rem;
      padding-top: 0.8rem;
      width: 100%;
      transition: color 0.2s;
      animation: buildItem 0.5s ease-out forwards;
      animation-delay: 1.2s;
      opacity: 0;
      transform: translateY(10px);
    }
    .back-button:hover {
      color: #ffffff;
    }

    .project-embed {
      background: #0c0c0c;
      border-radius: 1.8rem;
      padding: 1.5rem;
      border-left: 6px solid #ffffff;
      box-shadow: 0 8px 0 #030303;
    }

    .project-content {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      margin-bottom: 1rem;
    }

    .project-image {
      width: 70px;
      height: 70px;
      border-radius: 14px;
      overflow: hidden;
      flex-shrink: 0;
      transition: transform 0.2s ease;
      cursor: pointer;
      animation: buildItem 0.5s ease-out forwards;
      animation-delay: 0.2s;
      opacity: 0;
      transform: translateY(10px);
    }

    .project-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .project-image:hover {
      transform: scale(1.1);
    }

    .project-info {
      flex: 1;
      animation: buildItem 0.5s ease-out forwards;
      animation-delay: 0.4s;
      opacity: 0;
      transform: translateY(10px);
    }

    .project-title {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      margin-bottom: 0.3rem;
    }

    .project-name {
      color: #ffffff;
      font-size: 1.2rem;
      font-weight: 500;
    }

    .project-name a {
      color: #ffffff;
      text-decoration: none;
      border-bottom: 1px dotted #7a7a7a;
    }
    .project-name a:hover {
      border-bottom-color: #ffffff;
    }

    .project-description {
      color: #a0a0a0;
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .project-back-button {
      background: transparent;
      border: none;
      color: #a0a0a0;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0.5rem 0 0 0;
      text-align: left;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      border-top: 1px solid #2a2a2a;
      margin-top: 0.2rem;
      padding-top: 0.8rem;
      width: 100%;
      transition: color 0.2s;
      animation: buildItem 0.5s ease-out forwards;
      animation-delay: 0.6s;
      opacity: 0;
      transform: translateY(10px);
    }
    .project-back-button:hover {
      color: #ffffff;
    }

    .sleek-terminal {
      position: fixed;
      bottom: 80px;
      right: 20px;
      width: 340px;
      background: #111111;
      border-radius: 18px;
      box-shadow: 0 25px 40px -12px #000000, 0 0 0 1px rgba(255,255,255,0.15) inset;
      font-family: 'SF Mono', 'Menlo', 'Fira Code', monospace;
      font-size: 13px;
      color: #eeeeee;
      z-index: 1000;
      border: 1px solid #333333;
      transition: transform 0.2s ease, opacity 0.15s ease;
      transform-origin: bottom right;
    }

    .sleek-terminal.hidden {
      transform: scale(0.8);
      opacity: 0;
      pointer-events: none;
    }

    .term-header {
      background: #1e1e1e;
      padding: 12px 16px;
      border-radius: 18px 18px 0 0;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid #2f2f2f;
      color: #cccccc;
      font-weight: 450;
    }

    .custom-emoji {
      display: inline-block;
      width: 20px;
      height: 20px;
      background: #ffffff;
      border-radius: 4px 10px 10px 4px;
      box-shadow: 0 0 0 2px #222 inset, 0 0 0 3px #aaa inset;
      transform: rotate(2deg);
      margin-right: 4px;
    }

    .term-header span:last-child {
      background: #2a2a2a;
      padding: 2px 12px;
      border-radius: 30px;
      font-size: 11px;
      color: #b0b0b0;
      border: 1px solid #3d3d3d;
      margin-left: auto;
    }

    .term-body {
      background: #0c0c0c;
      padding: 18px 16px 16px 16px;
      border-radius: 0 0 18px 18px;
    }

    .input-line {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1a1a1a;
      padding: 10px 16px;
      border-radius: 40px;
      border: 1px solid #333;
      margin-bottom: 18px;
    }

    .prompt {
      color: #ffffff;
      font-weight: 500;
      font-size: 15px;
      opacity: 0.9;
    }

    #commandInput {
      background: transparent;
      border: none;
      color: #f0f0f0;
      font-family: inherit;
      font-size: 14px;
      width: 100%;
      outline: none;
    }

    #commandInput::placeholder {
      color: #5a5a5a;
    }

    .output-panel {
      background: #0a0a0a;
      border-radius: 14px;
      padding: 10px 4px 10px 14px;
      border: 1px solid #2b2b2b;
    }

    .scroll-list {
      max-height: 140px;
      overflow-y: auto;
      padding-right: 8px;
    }

    .scroll-list::-webkit-scrollbar {
      width: 5px;
    }
    .scroll-list::-webkit-scrollbar-track {
      background: #1a1a1a;
      border-radius: 20px;
    }
    .scroll-list::-webkit-scrollbar-thumb {
      background: #555;
      border-radius: 20px;
    }
    .scroll-list::-webkit-scrollbar-thumb:hover {
      background: #777;
    }

    .command-entry {
      font-family: 'SF Mono', monospace;
      color: #e0e0e0;
      padding: 8px 4px;
      border-bottom: 1px solid #252525;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
    }

    .command-badge {
      background: #1f1f1f;
      padding: 2px 12px;
      border-radius: 40px;
      color: #ffffff;
      font-weight: 500;
      border-left: 3px solid #888;
      letter-spacing: 0.3px;
    }

    .command-timestamp {
      color: #777;
      font-size: 11px;
      margin-left: auto;
    }

    .error-badge {
      background: #2c1a1a;
      padding: 2px 12px;
      border-radius: 40px;
      color: #ffafaf;
      border-left: 3px solid #aa5555;
    }

    .rainbow-badge {
      background: linear-gradient(90deg, #ff0000, #ff9900, #ffff00, #33ff00, #0099ff, #6633ff, #ff33ff);
      padding: 2px 12px;
      border-radius: 40px;
      color: #ffffff;
      font-weight: 500;
      border-left: 3px solid #ffffff;
      letter-spacing: 0.3px;
      animation: rainbowPulse 2s infinite;
    }

    @keyframes rainbowPulse {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.3); }
      100% { filter: brightness(1); }
    }

    .toggle-term-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 54px;
      height: 54px;
      border-radius: 30px;
      background: #111111;
      border: 2px solid #3a3a3a;
      color: #f0f0f0;
      font-size: 24px;
      font-weight: 400;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 0 #000000, 0 0 0 1px #5a5a5a inset;
      transition: 0.06s linear;
      z-index: 1100;
      user-select: none;
      font-family: 'Inter', sans-serif;
    }

    .toggle-term-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #000000, 0 0 0 1px #5a5a5a inset;
    }

    .toggle-term-btn span {
      transform: scale(0.9);
      letter-spacing: 1px;
    }

    .rainbow-particle {
      position: fixed;
      pointer-events: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      z-index: 9999;
      animation: fadeOut 1s ease-out forwards;
    }

    @keyframes fadeOut {
      0% {
        opacity: 1;
        transform: scale(1);
      }
      100% {
        opacity: 0;
        transform: scale(0.5);
      }
    }
  </style>
</head>
<body>
  <div class="card" id="app">
    <div class="profile-row" id="profileRow">
      <div class="avatar-wrapper">
        <img class="avatar" id="avatarImg" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="avatar">
        <div class="status-badge" id="statusBadge"></div>
      </div>
      <div class="name-area">
        <div class="display-name" id="displayName">Neko</div>
        <div class="username-tag" id="usernameTag">
          @neeeeekkkkkooooo
        </div>
      </div>
    </div>

    <div id="mainContent" class="main-content-compact fade-section">
      <div class="dev-tagline-compact" id="devTagline">
        <p>discord.js and python developer Ye</p>
      </div>
      
      <div class="spotify-embed" id="spotifyEmbed">
        <div class="song-row">
          <div class="album-art">
            <img id="albumArtImg" src="" alt="album cover" loading="lazy">
          </div>
          <div class="song-details">
            <div class="song-name" id="songName">Not playing anything</div>
            <div class="artist-name" id="artistName"></div>
            <div class="album-name" id="albumName"></div>
          </div>
        </div>
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
          </div>
          <div class="time-labels">
            <span class="current-time" id="currentTime">0:00</span>
            <span class="total-time" id="totalTime">0:00</span>
          </div>
        </div>
      </div>

      <div class="view-more-row">
        <span class="view-more-link" id="viewMoreBtn">view more...</span>
      </div>
    </div>

    <div class="more-section fade-section hidden" id="moreSection">
      <div class="transform-embed" id="transformEmbed"></div>
    </div>

    <div class="projects-section fade-section hidden" id="projectsSection">
      <div class="project-embed">
        <div class="project-content">
          <div class="project-image" id="projectImage">
            <img src="https://files.catbox.moe/n6vnon.webp" alt="jolly project">
          </div>
          <div class="project-info">
            <div class="project-title">
              <span class="project-name"><a href="https://discord.com/oauth2/authorize?client_id=1476697189035282555" target="_blank">jolly</a></span>
            </div>
            <div class="project-description">
              utility roblox bot made in discord.js
            </div>
          </div>
        </div>
        <button class="project-back-button" id="projectsBackButton">← back</button>
      </div>
    </div>
  </div>

  <div class="sleek-terminal hidden" id="sleekTerminal">
    <div class="term-header">
      <span class="custom-emoji"></span>
      <span style="color:#ddd;">neko@react</span>
      <span>zsh</span>
    </div>
    <div class="term-body">
      <div class="input-line">
        <span class="prompt">$</span>
        <input type="text" id="commandInput" placeholder="ping / rainbow" autocomplete="off">
      </div>
      <div class="output-panel">
        <div class="scroll-list" id="commandHistory"></div>
      </div>
    </div>
  </div>

  <div class="toggle-term-btn" id="toggleTermBtn"><span>{;}</span></div>

  <script>
    const CONFIG = { userId: '279827355743289344', discordCdn: 'https://cdn.discordapp.com' };
    let currentSongId = null;
    let intervalId = null;
    let isUpdating = true;
    let rainbowActive = false;

    const getAvatarUrl = (hash, id, discriminator) => {
      if (hash) return `${CONFIG.discordCdn}/avatars/${id}/${hash}.${hash.startsWith('a_') ? 'gif' : 'png'}?size=128`;
      return `https://cdn.discordapp.com/embed/avatars/${(discriminator || 0) % 5}.png`;
    };

    const formatTime = (ms) => {
      if (!ms || ms < 0) return '0:00';
      const totalSeconds = Math.floor(ms / 1000);
      return `${Math.floor(totalSeconds / 60)}:${(totalSeconds % 60).toString().padStart(2, '0')}`;
    };

    const getStatusClass = (status) => {
      const map = { online: 'online', idle: 'idle', dnd: 'dnd' };
      return map[status] || 'offline';
    };

    const calculateProgress = (start, end) => {
      if (!start || !end) return { percent: 0, current: '0:00', total: '0:00' };
      const now = Date.now();
      const total = end - start;
      const elapsed = Math.min(now - start, total);
      const percent = total > 0 ? (elapsed / total) * 100 : 0;
      return {
        percent: Math.min(100, Math.max(0, percent)),
        current: formatTime(elapsed),
        total: formatTime(total)
      };
    };

    const fetchData = async () => {
      try {
        const response = await axios.get(`https://api.lanyard.rest/v1/users/${CONFIG.userId}`);
        return response.data.success ? response.data.data : null;
      } catch { return null; }
    };

    const updateSpotifyUI = (spotify) => {
      const albumArt = document.getElementById('albumArtImg');
      const songName = document.getElementById('songName');
      const artistName = document.getElementById('artistName');
      const albumName = document.getElementById('albumName');
      const progressFill = document.getElementById('progressFill');
      const currentTime = document.getElementById('currentTime');
      const totalTime = document.getElementById('totalTime');

      if (!spotify) {
        if (currentSongId !== null) {
          albumArt.src = '';
          songName.textContent = 'Not playing anything';
          artistName.textContent = '';
          albumName.textContent = '';
          currentSongId = null;
        }
        progressFill.style.width = '0%';
        currentTime.textContent = '0:00';
        totalTime.textContent = '0:00';
        return;
      }

      const newSongId = `${spotify.song}-${spotify.artist}-${spotify.album}`;
      const { percent, current, total } = calculateProgress(spotify.timestamps?.start, spotify.timestamps?.end);

      if (newSongId !== currentSongId) {
        albumArt.src = spotify.album_art_url;
        songName.textContent = spotify.song;
        artistName.textContent = spotify.artist;
        albumName.textContent = spotify.album;
        currentSongId = newSongId;
      }

      progressFill.style.width = `${percent}%`;
      currentTime.textContent = current;
      totalTime.textContent = total;
    };

    const updateProfileUI = (discordUser, discordStatus) => {
      const user = discordUser || {};
      const avatarUrl = getAvatarUrl(user.avatar, user.id, user.discriminator);
      const displayName = user.display_name || user.global_name || 'Neko';
      const statusClass = getStatusClass(discordStatus);
      const username = user.username || 'neeeeekkkkkooooo';
      const discriminator = user.discriminator || '0';

      document.getElementById('avatarImg').src = avatarUrl;
      document.getElementById('statusBadge').className = `status-badge ${statusClass}`;
      document.getElementById('displayName').textContent = displayName;
      
      const usernameSpan = document.getElementById('usernameTag');
      usernameSpan.innerHTML = `@${username}${discriminator !== '0' ? `<span>#${discriminator}</span>` : ''}`;
    };

    const render = (data) => {
      if (!data) return;
      updateProfileUI(data.discord_user, data.discord_status || 'idle');
      if (!document.getElementById('mainContent').classList.contains('hidden')) {
        updateSpotifyUI(data.spotify);
      }
    };

    const resultsHTML = `
      <div class="results-state">
        <div class="projects-button-container">
          <span class="projects-button" id="projectsButtonInResults">projects</span>
        </div>
        <div class="profile-link-item">
          <a href="https://discord.com/users/279827355743289344" target="_blank">
            <img class="profile-icon" src="https://files.catbox.moe/29jekg.jpg" alt="Discord">
            <div class="profile-info">
              <div class="handle">@neeeeekkkkkooooo</div>
              <div class="platform">Discord</div>
            </div>
          </a>
        </div>
        <div class="profile-link-item">
          <a href="https://github.com/nekohere" target="_blank">
            <img class="profile-icon" src="https://files.catbox.moe/3fjgzl.jpg" alt="GitHub">
            <div class="profile-info">
              <div class="handle">Neko</div>
              <div class="platform">GitHub</div>
            </div>
          </a>
        </div>
        <div class="profile-link-item">
          <a href="https://www.bopimo.com/users/Nekooooo" target="_blank">
            <img class="profile-icon" src="https://i.imgur.com/yS9k0o0.png" alt="Bopimo">
            <div class="profile-info">
              <div class="handle">Neko</div>
              <div class="platform">Bopimo</div>
            </div>
          </a>
        </div>
        <div class="profile-link-item" style="border-bottom: 1px solid #222;">
          <a href="https://www.roblox.com" target="_blank">
            <img class="profile-icon" src="https://files.catbox.moe/98xr7w.jpg" alt="jollyandfestive">
            <div class="profile-info">
              <div class="handle">jollyandfestive</div>
              <div class="platform">Roblox</div>
            </div>
          </a>
        </div>
        <button class="back-button" id="backButton">← back</button>
      </div>
    `;

    const loadingHTML = `<div class="loading-state" id="loadingState"><img src="https://files.catbox.moe/xas1w0.gif" alt="thinking"><div class="thinking-text">loading...</div></div>`;

    const stopUpdates = () => {
      isUpdating = false;
      if (intervalId) { clearInterval(intervalId); intervalId = null; }
    };

    const resumeUpdates = () => {
      if (isUpdating) return;
      isUpdating = true;
      startUpdates();
    };

    const startUpdates = async () => {
      let currentData = null;
      const update = async () => {
        if (!isUpdating) return;
        const newData = await fetchData();
        if (newData) currentData = newData;
        render(currentData);
      };
      await update();
      if (intervalId) clearInterval(intervalId);
      intervalId = setInterval(update, 1000);
    };

    const viewMoreBtn = document.getElementById('viewMoreBtn');
    const mainContent = document.getElementById('mainContent');
    const projectsSection = document.getElementById('projectsSection');
    const moreSection = document.getElementById('moreSection');
    const transformEmbed = document.getElementById('transformEmbed');
    const projectsBackBtn = document.getElementById('projectsBackButton');
    const toggleBtn = document.getElementById('toggleTermBtn');
    const sleekTerminal = document.getElementById('sleekTerminal');
    const commandHistory = document.getElementById('commandHistory');
    const commandInput = document.getElementById('commandInput');

    projectsBackBtn.addEventListener('click', () => {
      projectsSection.classList.add('hidden');
      moreSection.classList.remove('hidden');
    });

    viewMoreBtn.addEventListener('click', () => {
      mainContent.classList.add('hidden');
      moreSection.classList.remove('hidden');
      transformEmbed.innerHTML = loadingHTML;
      stopUpdates();

      setTimeout(() => {
        transformEmbed.innerHTML = resultsHTML;
        document.getElementById('backButton').addEventListener('click', () => {
          mainContent.classList.remove('hidden');
          moreSection.classList.add('hidden');
          projectsSection.classList.add('hidden');
          resumeUpdates();
        });
        document.getElementById('projectsButtonInResults').addEventListener('click', () => {
          moreSection.classList.add('hidden');
          projectsSection.classList.remove('hidden');
        });
      }, 4000);
    });

    toggleBtn.addEventListener('click', () => {
      const willBeHidden = !sleekTerminal.classList.contains('hidden');
      sleekTerminal.classList.toggle('hidden');
      if (willBeHidden) { while (commandHistory.firstChild) commandHistory.removeChild(commandHistory.firstChild); }
    });

    const appendCommandEntry = (command, status) => {
      const entry = document.createElement('div');
      entry.className = 'command-entry';
      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      let badgeClass = 'command-badge';
      if (command === 'rainbow' && status === 'activated') badgeClass = 'rainbow-badge';
      entry.innerHTML = `<span class="${badgeClass}">${command}</span><span class="command-timestamp">${timeStr}</span>`;
      commandHistory.prepend(entry);
      while (commandHistory.children.length > 10) commandHistory.removeChild(commandHistory.lastElementChild);
    };

    const appendErrorEntry = (text) => {
      const entry = document.createElement('div');
      entry.className = 'command-entry';
      const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      entry.innerHTML = `<span class="error-badge">${text}</span><span class="command-timestamp">${timeStr}</span>`;
      commandHistory.prepend(entry);
      while (commandHistory.children.length > 10) commandHistory.removeChild(commandHistory.lastElementChild);
    };

    const executePing = async () => {
      const start = performance.now();
      try {
        await axios.get('https://httpbin.org/json');
        appendCommandEntry(`ping: ${Math.round(performance.now() - start)}ms`, 'success');
      } catch { appendErrorEntry('ping failed'); }
    };

    const startRainbow = () => {
      if (rainbowActive) { appendErrorEntry('rainbow already active'); return; }
      rainbowActive = true;
      appendCommandEntry('rainbow', 'activated');
      const colors = ['#ff0000', '#ff9900', '#ffff00', '#33ff00', '#0099ff', '#6633ff', '#ff33ff'];
      let index = 0;
      const mouseHandler = (e) => {
        if (!rainbowActive) return;
        const particle = document.createElement('div');
        particle.className = 'rainbow-particle';
        particle.style.left = e.clientX - 5 + 'px';
        particle.style.top = e.clientY - 5 + 'px';
        particle.style.backgroundColor = colors[index % colors.length];
        particle.style.boxShadow = `0 0 10px ${colors[index % colors.length]}`;
        document.body.appendChild(particle);
        index++;
        setTimeout(() => { if (particle.parentNode) particle.remove(); }, 1000);
      };
      document.addEventListener('mousemove', mouseHandler);
      setTimeout(() => {
        if (rainbowActive) {
          document.removeEventListener('mousemove', mouseHandler);
          rainbowActive = false;
          appendCommandEntry('rainbow ended', 'success');
        }
      }, 30000);
    };

    commandInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const value = commandInput.value.trim().toLowerCase();
        if (value === '') return;
        if (value === 'ping') { executePing(); }
        else if (value === 'rainbow') { startRainbow(); }
        else { appendErrorEntry(`unknown: ${value}`); }
        commandInput.value = '';
      }
    });

    startUpdates();
  </script>
</body>
</html>
